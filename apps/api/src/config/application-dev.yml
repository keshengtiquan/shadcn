# 开发环境配置
app:
  prefix: ''
  port: 3500
  logger:
    # 项目日志存储路径，相对路径（相对本项目根目录）或绝对路径
    dir: '../logs'
  captcha:
    # 是否开启验证码
    enable: false
# 数据库配置
db:
  DATABASE_URL: 'postgresql://dadaz:123456@127.0.0.1:5432/nest-template'

# redis 配置
redis:
  host: 'localhost'
  # password: '123456'
  port: 6379
  db: 0

# jwt 配置
jwt:
  secretkey: 'abcdefg'
  expiresin: '1h'
  refreshExpiresIn: '2h'
# 权限 白名单配置
perm:
  router:
    whitelist:
      [
        { path: '/captchaImage', method: 'GET' },
        { path: '/register', method: 'POST' },
        { path: '/auth/login', method: 'POST' },
        { path: '/logout', method: 'POST' },
        { path: '/system/user', method: 'POST' },
        { path: '/upload', method: 'POST' },
      ]

# 用户相关
# 初始密码， 重置密码
user:
  initialPassword: '123456'
